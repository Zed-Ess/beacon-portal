Below is a ready-to-paste shell script you can run locally from the repository root. It will:

- verify you're in a git repo and have no uncommitted changes (unless you set FORCE=1),
- create a new branch (default: add/pages-workflow),
- write the workflow file at .github/workflows/deploy-pages.yml,
- commit and push the branch to origin.

Save as add-pages-workflow.sh, make executable (chmod +x), then run ./add-pages-workflow.sh

Script:
```bash
#!/usr/bin/env bash
set -euo pipefail

# Usage: ./add-pages-workflow.sh
# Optional environment variables:
#   BRANCH - the branch to create (default: add/pages-workflow)
#   FORCE  - if set to 1, allow running with uncommitted changes (use with caution)

BRANCH="${BRANCH:-add/pages-workflow}"
WORKFLOW_PATH=".github/workflows/deploy-pages.yml"

# Exit with message
die() { echo "ERROR: $*" 1>&2; exit 1; }

# Ensure we're in a git repo
git rev-parse --is-inside-work-tree >/dev/null 2>&1 || die "Not inside a git repository. cd to the repo root and retry."

# Ensure origin exists
git remote get-url origin >/dev/null 2>&1 || die "No remote named 'origin' found. Add a remote and retry."

# Check for uncommitted changes
if [ "${FORCE:-0}" != "1" ]; then
  if [ -n "$(git status --porcelain)" ]; then
    die "You have uncommitted changes. Commit/stash them or run with FORCE=1 to continue anyway."
  fi
fi

# Fetch and ensure main exists locally (fetch remote refs)
git fetch origin --prune

# Ensure main branch exists on remote
if ! git ls-remote --heads origin main | grep -q refs/heads/main; then
  die "Remote 'origin' does not have a 'main' branch. Adjust the script or create main first."
fi

# Create and switch to branch
if git show-ref --quiet refs/heads/"$BRANCH"; then
  echo "Local branch '$BRANCH' already exists. Checking it out and resetting to origin/main."
  git checkout "$BRANCH"
  git reset --hard origin/main
else
  git checkout -b "$BRANCH" origin/main
fi

# Ensure directory exists
mkdir -p "$(dirname "$WORKFLOW_PATH")"

# Write workflow file (overwrites if exists on branch)
cat > "$WORKFLOW_PATH" <<'YAML'
name: Build and deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: pages-dist
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: pages-dist

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
YAML

# Add, commit, and push
git add "$WORKFLOW_PATH"
git commit -m "ci: add GitHub Actions workflow to build and deploy to GitHub Pages" || echo "No changes to commit."
git push --set-upstream origin "$BRANCH"

echo
echo "Done. Branch '$BRANCH' pushed to origin."
echo
echo "Next steps:"
echo "1) Open a pull request from '$BRANCH' into 'main' and merge it. You can use the GitHub web UI or the gh CLI:"
echo
echo "   # Open PR with gh (if installed):"
echo "   gh pr create --base main --head $BRANCH --title \"ci: add GitHub Pages deploy workflow\" --body \"Build the Vite React app and publish dist/ to GitHub Pages via Pages Actions.\" --repo Zed-Ess/beacon-portal"
echo
echo "   # Or open a PR via the web: visit https://github.com/Zed-Ess/beacon-portal/pulls and create a new PR from '$BRANCH' to 'main'"
echo
echo "2) Merge the PR. After merge a push to main will run the workflow and (if successful) deploy the site."
echo
echo "If the push is rejected due to branch protections, create a PR and follow your repo's review/CI requirements before merging."
```

What I did and what's next
- I prepared the exact workflow contents and wrapped them in a script that creates the branch, writes the file, commits, and pushes.
- Run the script locally. After the branch is pushed, open a PR (web UI or gh CLI) and merge it into main. Once merged, the workflow will run on the push to main and deploy to GitHub Pages.

