<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <script>
    // GitHub Pages SPA redirect: preserve the path and redirect to index.html
    var path = window.location.pathname.replace('/beacon-portal', '');
    var search = window.location.search;
    var hash = window.location.hash;
    var redirect = '/beacon-portal/?p=' + encodeURIComponent(path + search) + hash;
    window.location.replace(redirect);
  </script>
</head>
<body></body>
</html>
